<!DOCTYPE html>
<html lang="en" data-theme="dark" data-accent="orange">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#ff6b00">
<link rel="manifest" href="manifest.json">
<title>RL Training Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Exo+2:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root,[data-theme="dark"]{
--bg1:#0a0a0f;--bg2:#12121a;--bg3:#1a1a25;--bg4:#222233;
--tx1:#e8e8e8;--tx2:#a0a0b0;--tx3:#666680;
--glass:rgba(255,255,255,0.05);--glass2:rgba(255,255,255,0.08);--glass-b:rgba(255,255,255,0.08);
--shadow:0 8px 32px rgba(0,0,0,0.3);
}
[data-theme="amoled"]{
--bg1:#000;--bg2:#050505;--bg3:#0a0a0a;--bg4:#111;
--tx1:#fff;--tx2:#888;--tx3:#555;
--glass:rgba(255,255,255,0.03);--glass2:rgba(255,255,255,0.05);--glass-b:rgba(255,255,255,0.05);
}
[data-theme="light"]{
--bg1:#f0f0f5;--bg2:#fff;--bg3:#e8e8f0;--bg4:#d8d8e0;
--tx1:#1a1a2e;--tx2:#555566;--tx3:#888899;
--glass:rgba(0,0,0,0.04);--glass2:rgba(0,0,0,0.06);--glass-b:rgba(0,0,0,0.08);
--shadow:0 8px 32px rgba(0,0,0,0.1);
}
[data-accent="orange"]{--ac:#ff6b00;--ac2:#ff8c33;--acg:rgba(255,107,0,0.3)}
[data-accent="blue"]{--ac:#2196f3;--ac2:#42a5f5;--acg:rgba(33,150,243,0.3)}
[data-accent="green"]{--ac:#4caf50;--ac2:#66bb6a;--acg:rgba(76,175,80,0.3)}
[data-accent="purple"]{--ac:#9c27b0;--ac2:#ab47bc;--acg:rgba(156,39,176,0.3)}
html,body{height:100%;overflow-x:hidden}
body{font-family:'Exo 2',sans-serif;background:var(--bg1);color:var(--tx1);position:relative}
h1,h2,h3,h4{font-family:'Rajdhani',sans-serif;font-weight:700}
a{color:var(--ac);text-decoration:none}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--ac);border-radius:3px}
#hex-bg{position:fixed;top:0;left:0;right:0;bottom:0;z-index:-2;background-color:var(--bg1);
background-image:url("data:image/svg+xml,%3Csvg width='60' height='52' viewBox='0 0 60 52' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 0l25.98 15v30L30 60 4.02 45V15z' fill='none' stroke='%23ffffff' stroke-opacity='0.03' stroke-width='1'/%3E%3C/svg%3E");
background-size:60px 52px}
#particles-cv{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;pointer-events:none}
#confetti-cv{position:fixed;top:0;left:0;width:100%;height:100%;z-index:9999;pointer-events:none;display:none}
#rank-badge{position:fixed;top:12px;left:12px;z-index:100;display:flex;align-items:center;gap:8px;
background:var(--glass);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
border:1px solid var(--glass-b);border-radius:20px;padding:6px 14px 6px 10px;font-family:'Rajdhani',sans-serif;font-weight:600;font-size:13px}
.pulse-dot{width:8px;height:8px;border-radius:50%;background:var(--ac);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(1.3)}}
#rank-badge .username{color:var(--tx1)}
#rank-badge .rank{color:var(--ac);margin-left:4px}
#hero{position:relative;width:100%;height:195px;overflow:hidden;border-bottom:2px solid var(--ac);background:#0a0a0f}
#hero-container{width:100%;height:100%}
#hero-container canvas{width:100%!important;height:100%!important;display:block}
#trick-label{position:absolute;bottom:10px;right:14px;font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700;color:var(--ac);text-shadow:0 0 12px var(--acg);opacity:0;transition:opacity 0.6s}
#hero-hud{position:absolute;top:8px;left:50%;transform:translateX(-50%);display:flex;gap:24px;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:16px;color:#fff;text-shadow:0 2px 4px rgba(0,0,0,0.5)}
#hero-hud .score-o{color:#ff6b00}
#hero-hud .score-b{color:#2196f3}
#tab-bar{display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;background:var(--bg2);border-bottom:1px solid var(--glass-b);padding:0 4px;position:sticky;top:0;z-index:50}
#tab-bar::-webkit-scrollbar{display:none}
.tab-btn{flex:0 0 auto;padding:12px 14px;font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:600;
color:var(--tx3);background:none;border:none;border-bottom:3px solid transparent;cursor:pointer;white-space:nowrap;transition:all 0.2s}
.tab-btn.active{color:var(--ac);border-bottom-color:var(--ac)}
.tab-btn:hover{color:var(--tx1)}
.tab-panel{display:none;padding:16px;max-width:800px;margin:0 auto;padding-bottom:80px}
.tab-panel.active{display:block}
.card{background:var(--glass);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid var(--glass-b);border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:var(--shadow);transition:transform 0.2s}
.card:hover{transform:translateY(-1px)}
.card h3{font-size:16px;margin-bottom:8px}
.card p{font-size:13px;color:var(--tx2);line-height:1.5}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;border:none;font-family:'Rajdhani',sans-serif;font-weight:600;font-size:14px;cursor:pointer;transition:all 0.2s}
.btn-primary{background:var(--ac);color:#fff}
.btn-primary:hover{background:var(--ac2);transform:translateY(-1px)}
.btn-sm{padding:5px 10px;font-size:12px;border-radius:6px}
.btn-outline{background:transparent;border:1px solid var(--ac);color:var(--ac)}
.btn-outline:hover{background:var(--acg)}
.btn-ghost{background:var(--glass);color:var(--tx2);border:1px solid var(--glass-b)}
.btn-ghost.active{color:var(--ac);border-color:var(--ac);background:var(--acg)}
input,select,textarea{background:var(--bg3);border:1px solid var(--glass-b);border-radius:8px;padding:8px 12px;color:var(--tx1);font-family:'Exo 2',sans-serif;font-size:13px;width:100%;transition:border-color 0.2s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--ac)}
select{cursor:pointer}
.progress-bar{height:6px;border-radius:3px;background:var(--bg3);overflow:hidden;margin:8px 0}
.progress-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#ff6b00,#2196f3);transition:width 0.5s}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;font-family:'Rajdhani',sans-serif}
.badge-mastered{background:rgba(76,175,80,0.2);color:#4caf50}
.badge-learning{background:rgba(255,107,0,0.2);color:#ff6b00}
.badge-next{background:rgba(33,150,243,0.2);color:#2196f3}
.badge-later{background:rgba(102,102,102,0.2);color:#888}
.toolbar{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;align-items:center}
.toolbar select,.toolbar input{width:auto;flex:0 0 auto;min-width:100px}
.search-input{flex:1;min-width:150px}
.filter-pills{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.pill{padding:4px 12px;border-radius:16px;font-size:12px;font-family:'Rajdhani',sans-serif;font-weight:600;cursor:pointer;background:var(--glass);border:1px solid var(--glass-b);color:var(--tx2);transition:all 0.2s}
.pill.active{background:var(--acg);border-color:var(--ac);color:var(--ac)}
.mech-card{cursor:pointer;position:relative}
.mech-card .mech-header{display:flex;justify-content:space-between;align-items:center}
.mech-card .mech-body{max-height:0;overflow:hidden;transition:max-height 0.3s}
.mech-card.expanded .mech-body{max-height:400px}
.mech-card .fav-btn{background:none;border:none;cursor:pointer;font-size:18px;padding:4px}
.diff-dots{display:inline-flex;gap:3px}
.diff-dot{width:8px;height:8px;border-radius:50%;background:var(--bg4)}
.diff-dot.filled{background:var(--ac)}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.stat-card{text-align:center;padding:12px 8px}
.stat-card .stat-val{font-size:24px;font-weight:700;font-family:'Rajdhani',sans-serif;color:var(--ac)}
.stat-card .stat-lbl{font-size:11px;color:var(--tx2);margin-top:2px}
.heatmap{display:flex;gap:2px;flex-wrap:wrap;margin:16px 0}
.hm-cell{width:12px;height:12px;border-radius:2px;background:var(--bg3)}
.hm-cell.l1{background:rgba(255,107,0,0.2)}
.hm-cell.l2{background:rgba(255,107,0,0.4)}
.hm-cell.l3{background:rgba(255,107,0,0.6)}
.hm-cell.l4{background:rgba(255,107,0,0.9)}
.chart-container{position:relative;width:100%;height:200px;margin:16px 0}
.chart-container canvas{width:100%;height:100%}
.session-form{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.session-form .full{grid-column:1/-1}
.session-list{max-height:300px;overflow-y:auto}
.session-item{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;border-bottom:1px solid var(--glass-b);font-size:13px}
.routine-block{margin-bottom:8px}
.routine-block .block-header{display:flex;justify-content:space-between;align-items:center;padding:12px;cursor:pointer}
.routine-block .block-timer{font-family:'Rajdhani',sans-serif;font-size:28px;font-weight:700;color:var(--ac);text-align:center;padding:16px}
.routine-block .block-items{padding:0 12px 12px;font-size:13px;color:var(--tx2)}
.goal-card .goal-meta{display:flex;gap:16px;margin:8px 0;font-size:13px;color:var(--tx2)}
.goal-checklist{list-style:none;padding:0}
.goal-checklist li{padding:6px 0;border-bottom:1px solid var(--glass-b);font-size:13px;display:flex;align-items:center;gap:8px}
.goal-checklist input[type="checkbox"]{width:16px;height:16px;accent-color:var(--ac)}
.garage-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin-bottom:16px}
.car-card{text-align:center;cursor:pointer;padding:12px}
.car-card.selected{border-color:var(--ac);background:var(--acg)}
.car-card .car-name{font-family:'Rajdhani',sans-serif;font-weight:600;font-size:14px;margin-top:8px}
.car-card .car-type{font-size:11px;color:var(--tx2)}
#garage-preview{width:100%;height:250px;border-radius:12px;overflow:hidden;background:var(--bg3);margin-bottom:16px}
#garage-preview canvas{width:100%!important;height:100%!important}
.pro-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:16px}
.pro-card{text-align:center;cursor:pointer;padding:12px}
.pro-card.selected{border-color:var(--ac);background:var(--acg)}
.pro-card .pro-name{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:15px}
.pro-card .pro-team{font-size:11px;color:var(--tx2)}
.pro-detail{margin-top:16px}
.pro-subtabs{display:flex;gap:8px;margin-bottom:12px}
.pro-subtab{padding:6px 14px;border-radius:8px;font-size:12px;font-family:'Rajdhani',sans-serif;font-weight:600;cursor:pointer;background:var(--glass);border:1px solid var(--glass-b);color:var(--tx2)}
.pro-subtab.active{background:var(--acg);border-color:var(--ac);color:var(--ac)}
.pro-info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.pro-info-item{padding:8px;background:var(--bg3);border-radius:8px}
.pro-info-item .label{font-size:11px;color:var(--tx3);text-transform:uppercase}
.pro-info-item .value{font-size:15px;font-weight:600;font-family:'Rajdhani',sans-serif}
.shop-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-bottom:1px solid var(--glass-b)}
.shop-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.shop-name{flex:1;font-weight:600;font-size:14px}
.shop-type{font-size:12px;color:var(--tx2);flex-shrink:0}
.shop-price{font-family:'Rajdhani',sans-serif;font-weight:700;color:var(--ac);flex-shrink:0}
#game-wrap{position:relative;width:100%;max-width:700px;margin:0 auto}
#game-canvas{width:100%;border-radius:12px;background:#1a472a;display:block}
.game-hud{display:flex;justify-content:space-between;align-items:center;padding:8px 0;font-family:'Rajdhani',sans-serif}
.game-score{font-size:28px;font-weight:700}
.game-boost-bar{width:100%;height:8px;background:var(--bg3);border-radius:4px;margin-top:4px}
.game-boost-fill{height:100%;background:linear-gradient(90deg,#ff6b00,#ffaa00);border-radius:4px;transition:width 0.1s}
.touch-controls{display:none;justify-content:space-between;padding:8px 0;gap:8px}
.touch-btn{flex:1;padding:16px 8px;border-radius:10px;background:var(--glass);border:2px solid var(--glass-b);color:var(--tx1);font-family:'Rajdhani',sans-serif;font-weight:700;font-size:16px;text-align:center;cursor:pointer;user-select:none;-webkit-user-select:none;touch-action:manipulation}
.touch-btn:active{background:var(--acg);border-color:var(--ac)}
@media (hover:none) and (pointer:coarse){.touch-controls{display:flex}}
.more-subtabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.more-subtab{padding:6px 14px;border-radius:8px;font-size:13px;font-family:'Rajdhani',sans-serif;font-weight:600;cursor:pointer;background:var(--glass);border:1px solid var(--glass-b);color:var(--tx2)}
.more-subtab.active{background:var(--acg);border-color:var(--ac);color:var(--ac)}
.more-panel{display:none}
.more-panel.active{display:block}
.mindset-rule{padding:12px;margin-bottom:8px;border-left:3px solid var(--ac)}
.mindset-rule .rule-num{font-family:'Rajdhani',sans-serif;font-weight:700;color:var(--ac);font-size:18px}
.achieve-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
.achieve-card{text-align:center;padding:16px 8px;opacity:0.4}
.achieve-card.unlocked{opacity:1}
.achieve-card .achieve-icon{font-size:32px;margin-bottom:4px}
.achieve-card .achieve-name{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:13px}
.achieve-card .achieve-desc{font-size:11px;color:var(--tx2)}
.settings-group{margin-bottom:20px}
.settings-group h3{margin-bottom:10px;font-size:15px}
.settings-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--glass-b)}
.settings-row label{font-size:13px;color:var(--tx2)}
.settings-row select,.settings-row input{width:auto;max-width:160px}
.daily-challenge{border:2px solid var(--ac);background:var(--acg);margin-bottom:16px}
.daily-challenge h3{color:var(--ac)}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn 0.3s ease}
.confetti-piece{position:absolute;width:8px;height:8px;border-radius:1px}
@media(max-width:480px){
.stats-row{grid-template-columns:repeat(2,1fr)}
.session-form{grid-template-columns:1fr}
.pro-info-grid{grid-template-columns:1fr}
.garage-grid{grid-template-columns:repeat(3,1fr)}
}
</style>
</head>
<body>
<div id="hex-bg"></div>
<canvas id="particles-cv"></canvas>
<canvas id="confetti-cv"></canvas>

<div id="trick-label"></div>

<div id="tab-bar">

<button class="tab-btn" data-tab="goals">Goals</button>
<button class="tab-btn" data-tab="garage">Garage</button>
<button class="tab-btn" data-tab="pros">Pros</button>
<button class="tab-btn" data-tab="shop">Shop</button>
<button class="tab-btn" data-tab="play">Play</button>
<button class="tab-btn" data-tab="more">More</button>

<div id="tab-content">
<div id="tab-mechanics" class="tab-panel active"></div>

<div id="tab-play" class="tab-panel"></div>
<div id="tab-more" class="tab-panel"></div>
</div>

/* ===== PARTICLES ===== */
var particles=[];
function initParticles(){
var cv=$("particles-cv");
var ctx=cv.getContext("2d");
function resize(){cv.width=window.innerWidth;cv.height=window.innerHeight;}
resize();window.addEventListener("resize",resize);
for(var i=0;i<40;i++){particles.push({x:Math.random()*cv.width,y:Math.random()*cv.height,r:Math.random()*2+0.5,dx:(Math.random()-0.5)*0.3,dy:(Math.random()-0.5)*0.3,o:Math.random()*0.3+0.1});}
function draw(){
ctx.clearRect(0,0,cv.width,cv.height);
for(var i=0;i<particles.length;i++){
var p=particles[i];
p.x+=p.dx;p.y+=p.dy;
if(p.x<0)p.x=cv.width;if(p.x>cv.width)p.x=0;
if(p.y<0)p.y=cv.height;if(p.y>cv.height)p.y=0;
ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fillStyle="rgba(255,107,0,"+p.o+")";ctx.fill();
}
requestAnimationFrame(draw);
}
draw();
}

/* ===== CONFETTI ===== */
var confettiPieces=[];
var confettiRunning=false;
function fireConfetti(){
var cv=$("confetti-cv");
cv.style.display="block";
var ctx=cv.getContext("2d");
cv.width=window.innerWidth;cv.height=window.innerHeight;
confettiPieces=[];
var colors=["#ff6b00","#2196f3","#4caf50","#ff4444","#ffd700","#e040fb"];
for(var i=0;i<80;i++){
confettiPieces.push({x:cv.width/2+Math.random()*200-100,y:cv.height/2,vx:(Math.random()-0.5)*12,vy:Math.random()*-14-4,r:Math.random()*8+4,c:colors[Math.floor(Math.random()*colors.length)],rot:Math.random()*360,rv:(Math.random()-0.5)*10,life:1});
}
if(!confettiRunning){confettiRunning=true;animConfetti(cv,ctx);}
}
function animConfetti(cv,ctx){
ctx.clearRect(0,0,cv.width,cv.height);
var alive=0;
for(var i=0;i<confettiPieces.length;i++){
var p=confettiPieces[i];
if(p.life<=0)continue;alive++;
p.vy+=0.3;p.x+=p.vx;p.y+=p.vy;p.rot+=p.rv;p.life-=0.008;
ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);
ctx.fillStyle=p.c;ctx.globalAlpha=p.life;
ctx.fillRect(-p.r/2,-p.r/2,p.r,p.r);
ctx.restore();
}
if(alive>0){requestAnimationFrame(function(){animConfetti(cv,ctx);});}
else{cv.style.display="none";confettiRunning=false;}
}

var boostGeo=new THREE.CylinderGeometry(0.2,0.2,0.05,8);
var boostMat=new THREE.MeshStandardMaterial({color:0xff6b00,emissive:0xff6b00,emissiveIntensity:0.5});
var boostPositions=[[-8,0,-5],[-8,0,5],[8,0,-5],[8,0,5],[0,0,-7],[0,0,7]];

function animateHero(){
requestAnimationFrame(animateHero);
if(!heroRenderer)return;
var t=Date.now()*0.001;

/* rotate ball */
if(heroBall){heroBall.rotation.x=t*0.5;heroBall.rotation.y=t*0.3;}

/* trick animation cycle */
var elapsed=Date.now()-heroTrickTimer;
var trickPhase=(elapsed%8000)/8000;
var trickIdx=Math.floor(elapsed/8000)%4;

if(heroOctane){
var baseX=-3,baseY=0;
if(trickIdx===0){/* Fast Aerial */
heroOctane.position.y=baseY+Math.sin(trickPhase*Math.PI)*5;
heroOctane.position.x=baseX+trickPhase*2;
heroOctane.rotation.z=-trickPhase*0.5;
}else if(trickIdx===1){/* Musty Flick */
heroOctane.position.y=baseY+Math.sin(trickPhase*Math.PI)*1.5;
heroOctane.position.x=baseX+trickPhase;
heroOctane.rotation.z=Math.sin(trickPhase*Math.PI*2)*1.5;
}else if(trickIdx===2){/* Flip Reset */
heroOctane.position.y=baseY+Math.sin(trickPhase*Math.PI)*4;
heroOctane.position.x=baseX+Math.sin(trickPhase*Math.PI)*2;
heroOctane.rotation.x=trickPhase*Math.PI*2;
heroOctane.rotation.z=0;
}else{/* Tornado Flick */
heroOctane.position.y=baseY+Math.sin(trickPhase*Math.PI)*2;
heroOctane.position.x=baseX+trickPhase*1.5;
heroOctane.rotation.z=trickPhase*Math.PI*6;
}
if(trickPhase>0.9){
heroOctane.position.set(baseX,baseY,0);
heroOctane.rotation.set(0,Math.PI/2,0);
}
}
if(heroBall){
heroBall.position.x=Math.sin(t*0.8)*2;
heroBall.position.y=0.6+Math.abs(Math.sin(t*1.5))*1.5;
}

/* trick label */
var label=$("trick-label");
if(label){
var show=trickPhase>0.05&&trickPhase<0.85;
label.style.opacity=show?"1":"0";
label.textContent=TRICKS[trickIdx];
}

/* hero HUD timer */
heroTime-=0.016;
if(heroTime<=0){heroTime=299;heroScore=[0,0];}
var m=Math.floor(heroTime/60);
var s=Math.floor(heroTime%60);
if($("hero-timer"))$("hero-timer").textContent=m+":"+(s<10?"0":"")+s;
if($("hero-s-o"))$("hero-s-o").textContent=heroScore[0];
if($("hero-s-b"))$("hero-s-b").textContent=heroScore[1];

heroRenderer.render(heroScene,heroCamera);
}

}

var routineTimers={};

function renderRoutine(){
var panel=$("tab-routine");

ROUTINE_BLOCKS.forEach(function(block,idx){
if(!routineTimers[idx])routineTimers[idx]={remaining:block.dur*60,running:false,done:false};
var rt=routineTimers[idx];
var mins=Math.floor(rt.remaining/60);
var secs=rt.remaining%60;
html+='<div class="card routine-block" data-ridx="'+idx+'">';
html+='<div class="block-header"><div><h3 style="margin:0">'+block.name+'</h3>';
html+='<span style="font-size:12px;color:var(--tx2)">'+block.dur+' min</span></div>';
html+='<button class="btn btn-sm '+(rt.running?"btn-primary":"btn-outline")+'" data-rtimer="'+idx+'">'+(rt.done?"Done":rt.running?"Pause":"Start")+'</button></div>';
html+='<div class="block-timer'+(rt.done?" style=\"color:#4caf50\"":"")+'">'+(rt.done?"Complete":mins+":"+(secs<10?"0":"")+secs)+'</div>';
html+='<div class="block-items"><ul style="list-style:disc;padding-left:20px">';
block.items.forEach(function(item){html+='<li>'+item+'</li>';});
html+='</ul></div></div>';
});

html+='<button class="btn btn-primary" id="routine-reset" style="margin-top:12px;width:100%">Reset All Timers</button>';
panel.innerHTML=html;

/* timer buttons */
var tBtns=qsa("button[data-rtimer]");
for(var i=0;i<tBtns.length;i++){
tBtns[i].addEventListener("click",function(){
var idx=parseInt(this.getAttribute("data-rtimer"));
var rt=routineTimers[idx];
if(rt.done)return;
if(rt.running){
rt.running=false;
clearInterval(routineIntervals[idx]);
}else{
rt.running=true;
routineIntervals[idx]=setInterval(function(){
rt.remaining--;
if(rt.remaining<=0){
rt.remaining=0;rt.done=true;rt.running=false;
clearInterval(routineIntervals[idx]);
var allDone=true;
for(var k in routineTimers){if(!routineTimers[k].done)allDone=false;}
if(allDone){routinesDone++;saveJSON("rl_routines_done",routinesDone);checkAchieve("routine_runner");fireConfetti();}
}
renderRoutine();
},1000);
}
renderRoutine();
});
}

/* reset */
if($("routine-reset")){
$("routine-reset").addEventListener("click",function(){
for(var k in routineIntervals)clearInterval(routineIntervals[k]);
routineTimers={};routineIntervals={};renderRoutine();
});
}

/* update progress */
var done=0;
for(var k in routineTimers){if(routineTimers[k].done)done++;}
if($("routine-progress"))$("routine-progress").style.width=(done/ROUTINE_BLOCKS.length*100)+"%";
if($("routine-done-lbl"))$("routine-done-lbl").textContent="Completed: "+done+" / "+ROUTINE_BLOCKS.length+" blocks";
}

function drawChart(){
var cv=$("rank-chart");
if(!cv)return;
var ctx=cv.getContext("2d");
var w=cv.parentElement.clientWidth;
var h=200;
cv.width=w;cv.height=h;
ctx.clearRect(0,0,w,h);

if(sessions.length<2){
ctx.fillStyle=getComputedStyle(document.documentElement).getPropertyValue("--tx3");
ctx.font="14px 'Exo 2'";ctx.textAlign="center";
ctx.fillText("Log at least 2 sessions to see chart",w/2,h/2);
return;
}

var padding=40;
var chartW=w-padding*2,chartH=h-padding*2;
var points=sessions.map(function(s){return RANKS.indexOf(s.rank);});
var minR=Math.max(0,Math.min.apply(null,points)-2);
var maxR=Math.min(RANKS.length-1,Math.max.apply(null,points)+2);
var rangeR=maxR-minR||1;

/* grid */
ctx.strokeStyle="rgba(255,255,255,0.05)";ctx.lineWidth=1;
for(var i=0;i<=4;i++){
var y=padding+chartH*(i/4);
ctx.beginPath();ctx.moveTo(padding,y);ctx.lineTo(w-padding,y);ctx.stroke();
}

/* rank labels */
ctx.fillStyle=getComputedStyle(document.documentElement).getPropertyValue("--tx3");
ctx.font="10px 'Exo 2'";ctx.textAlign="right";
for(var i=0;i<=4;i++){
var rIdx=Math.round(maxR-i*(rangeR/4));
if(rIdx>=0&&rIdx<RANKS.length)ctx.fillText(RANKS[rIdx],padding-4,padding+chartH*(i/4)+3);
}

/* line */
ctx.beginPath();
ctx.strokeStyle=getComputedStyle(document.documentElement).getPropertyValue("--ac")||"#ff6b00";
ctx.lineWidth=2;
for(var i=0;i<points.length;i++){
var x=padding+(i/(points.length-1))*chartW;
var y=padding+chartH*(1-(points[i]-minR)/rangeR);
if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
}
ctx.stroke();

/* dots */
for(var i=0;i<points.length;i++){
var x=padding+(i/(points.length-1))*chartW;
var y=padding+chartH*(1-(points[i]-minR)/rangeR);
ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);
ctx.fillStyle=ctx.strokeStyle;ctx.fill();
}
}

}

function initGaragePreview(){

/* ===== PLAY TAB (Mini Game) ===== */
var gameState={
running:false,started:false,
score:[0,0],maxScore:3,
player:{x:80,y:0,vx:0,vy:0,w:50,h:25,grounded:true,jumps:0,boost:100,flip:false,flipTimer:0},
ai:{x:0,y:0,vx:0,vy:0,w:50,h:25,grounded:true,jumps:0,boost:100},
ball:{x:0,y:0,vx:0,vy:0,r:12},
gravity:0.45,groundY:0,goalW:15,goalH:90,
W:700,H:350,
keys:{},touchK:{},
audioCtx:null,goalCooldown:0
};

function initGame(){
var panel=$("tab-play");
var html='<h2 style="margin-bottom:12px">Rocket Sideswipe</h2>';
html+='<div class="game-hud"><span class="game-score"><span style="color:#ff6b00" id="g-score-p">0</span> - <span style="color:#2196f3" id="g-score-ai">0</span></span>';
html+='<span id="g-status" style="color:var(--tx2);font-size:14px">Press Start</span></div>';
html+='<div id="game-wrap"><canvas id="game-canvas" width="700" height="350"></canvas></div>';
html+='<div style="margin:8px 0"><span style="font-size:12px;color:var(--tx2)">Boost: </span><div class="game-boost-bar"><div class="game-boost-fill" id="g-boost" style="width:100%"></div></div></div>';
html+='<div class="touch-controls"><button class="touch-btn" data-tk="left">&larr;</button><button class="touch-btn" data-tk="right">&rarr;</button><button class="touch-btn" data-tk="jump">JUMP</button><button class="touch-btn" data-tk="boost">BOOST</button></div>';
html+='<div style="text-align:center;margin-top:12px"><button class="btn btn-primary" id="g-start">Start Game</button> <button class="btn btn-outline" id="g-reset">Reset</button></div>';
html+='<p style="font-size:11px;color:var(--tx3);text-align:center;margin-top:8px">Keys: Arrow keys to move, Space to jump (double tap for flip), Shift for boost</p>';
panel.innerHTML=html;

var cv=$("game-canvas");
if(!cv)return;
var ctx=cv.getContext("2d");
var gs=gameState;
gs.W=cv.width;gs.H=cv.height;
gs.groundY=gs.H-30;
gs.player.x=80;gs.player.y=gs.groundY-gs.player.h;
gs.ai.x=gs.W-80-gs.ai.w;gs.ai.y=gs.groundY-gs.ai.h;
gs.ball.x=gs.W/2;gs.ball.y=gs.groundY-100;gs.ball.vx=0;gs.ball.vy=0;

try{gs.audioCtx=new (window.AudioContext||window.webkitAudioContext)();}catch(e){}

function playSound(freq,dur,type){
if(!gs.audioCtx)return;
try{
var osc=gs.audioCtx.createOscillator();
var gain=gs.audioCtx.createGain();
osc.connect(gain);gain.connect(gs.audioCtx.destination);
osc.frequency.value=freq;osc.type=type||"square";
gain.gain.setValueAtTime(0.15,gs.audioCtx.currentTime);
gain.gain.exponentialRampToValueAtTime(0.001,gs.audioCtx.currentTime+dur);
osc.start();osc.stop(gs.audioCtx.currentTime+dur);
}catch(e){}
}

/* keyboard */
document.addEventListener("keydown",function(e){
gs.keys[e.code]=true;
if(e.code==="Space"&&gs.running){
e.preventDefault();
doJump(gs.player);
}
});
document.addEventListener("keyup",function(e){gs.keys[e.code]=false;});

/* touch */
var tBtns=qsa(".touch-btn[data-tk]");
for(var i=0;i<tBtns.length;i++){
(function(btn){
btn.addEventListener("touchstart",function(e){e.preventDefault();gs.touchK[btn.getAttribute("data-tk")]=true;
if(btn.getAttribute("data-tk")==="jump"&&gs.running)doJump(gs.player);});
btn.addEventListener("touchend",function(e){e.preventDefault();gs.touchK[btn.getAttribute("data-tk")]=false;});
btn.addEventListener("mousedown",function(){gs.touchK[btn.getAttribute("data-tk")]=true;
if(btn.getAttribute("data-tk")==="jump"&&gs.running)doJump(gs.player);});
btn.addEventListener("mouseup",function(){gs.touchK[btn.getAttribute("data-tk")]=false;});
})(tBtns[i]);
}

function doJump(car){
if(car.grounded){
car.vy=-9;car.grounded=false;car.jumps=1;
playSound(400,0.1,"sine");
}else if(car.jumps===1){
/* double jump / flip */
car.jumps=2;
car.vy=-7;
if(gs.keys["ArrowLeft"]||gs.touchK.left)car.vx-=6;
else if(gs.keys["ArrowRight"]||gs.touchK.right)car.vx+=6;
car.flip=true;car.flipTimer=15;
playSound(600,0.15,"sine");
}
}

function resetBall(){
gs.ball.x=gs.W/2;gs.ball.y=gs.groundY-120;gs.ball.vx=(Math.random()-0.5)*3;gs.ball.vy=-2;
gs.player.x=80;gs.player.y=gs.groundY-gs.player.h;gs.player.vx=0;gs.player.vy=0;gs.player.grounded=true;gs.player.jumps=0;gs.player.boost=100;
gs.ai.x=gs.W-80-gs.ai.w;gs.ai.y=gs.groundY-gs.ai.h;gs.ai.vx=0;gs.ai.vy=0;gs.ai.grounded=true;gs.ai.jumps=0;
gs.goalCooldown=60;
}

function updateCar(car,isAI){
/* gravity */
car.vy+=gs.gravity;
car.x+=car.vx;car.y+=car.vy;

/* friction */
if(car.grounded){car.vx*=0.88;}else{car.vx*=0.98;}

/* ground */
if(car.y+car.h>=gs.groundY){
car.y=gs.groundY-car.h;car.vy=0;car.grounded=true;car.jumps=0;car.flip=false;
}
/* ceiling */
if(car.y<0){car.y=0;car.vy=Math.abs(car.vy)*0.5;}
/* walls */
if(car.x<0){car.x=0;car.vx=0;}
if(car.x+car.w>gs.W){car.x=gs.W-car.w;car.vx=0;}

if(car.flipTimer>0)car.flipTimer--;
if(car.flipTimer===0)car.flip=false;
}

function updateAI(){
var ai=gs.ai;
var bx=gs.ball.x,by=gs.ball.y;
var dx=bx-(ai.x+ai.w/2);
var dy=by-(ai.y);

/* move toward ball */
if(dx>20)ai.vx+=0.5;
else if(dx<-20)ai.vx-=0.5;
ai.vx=Math.max(-4,Math.min(4,ai.vx));

/* jump when ball is above */
if(by<ai.y-40&&Math.abs(dx)<100&&ai.grounded&&Math.random()>0.6){
ai.vy=-9;ai.grounded=false;ai.jumps=1;
}
/* double jump / aerial */
if(!ai.grounded&&ai.jumps===1&&by<ai.y&&Math.abs(dx)<80&&Math.random()>0.7){
ai.vy=-7;ai.jumps=2;
if(dx>0)ai.vx+=3;else ai.vx-=3;
}
/* boost toward ball */
if(Math.abs(dx)>150&&ai.boost>0){
ai.vx+=dx>0?0.8:-0.8;
ai.boost-=0.5;
}
if(ai.boost<100&&ai.grounded)ai.boost+=0.3;
}

function checkBallCarCollision(car){
var bx=gs.ball.x,by=gs.ball.y,br=gs.ball.r;
var cx=car.x+car.w/2,cy=car.y+car.h/2;
var dx=bx-Math.max(car.x,Math.min(bx,car.x+car.w));
var dy=by-Math.max(car.y,Math.min(by,car.y+car.h));
if(dx*dx+dy*dy<br*br){
var angle=Math.atan2(by-cy,bx-cx);
var speed=Math.sqrt(gs.ball.vx*gs.ball.vx+gs.ball.vy*gs.ball.vy);
var hitSpeed=Math.max(speed,5)+(car.flip?4:0);
gs.ball.vx=Math.cos(angle)*hitSpeed;
gs.ball.vy=Math.sin(angle)*hitSpeed;
gs.ball.x=bx+Math.cos(angle)*br;
gs.ball.y=by+Math.sin(angle)*br;
playSound(300,0.08,"triangle");
}
}

function update(){
if(!gs.running)return;
if(gs.goalCooldown>0){gs.goalCooldown--;return;}

/* player input */
var p=gs.player;
if(gs.keys["ArrowLeft"]||gs.touchK.left)p.vx-=0.7;
if(gs.keys["ArrowRight"]||gs.touchK.right)p.vx+=0.7;
if((gs.keys["ShiftLeft"]||gs.keys["ShiftRight"]||gs.touchK.boost)&&p.boost>0){
p.vx+=(gs.keys["ArrowRight"]||gs.touchK.right)?1.2:(gs.keys["ArrowLeft"]||gs.touchK.left)?-1.2:0;
if(!p.grounded)p.vy-=0.4;
p.boost-=0.8;
}
if(p.boost<100&&p.grounded)p.boost+=0.2;
p.vx=Math.max(-6,Math.min(6,p.vx));

updateCar(p,false);
updateAI();
updateCar(gs.ai,true);

/* ball physics */
gs.ball.vy+=gs.gravity*0.6;
gs.ball.x+=gs.ball.vx;gs.ball.y+=gs.ball.vy;
gs.ball.vx*=0.998;

/* ball walls */
if(gs.ball.y-gs.ball.r<0){gs.ball.y=gs.ball.r;gs.ball.vy*=-0.7;}
if(gs.ball.y+gs.ball.r>gs.groundY){gs.ball.y=gs.groundY-gs.ball.r;gs.ball.vy*=-0.7;gs.ball.vx*=0.95;}
if(gs.ball.x-gs.ball.r<0){gs.ball.x=gs.ball.r;gs.ball.vx*=-0.7;}
if(gs.ball.x+gs.ball.r>gs.W){gs.ball.x=gs.W-gs.ball.r;gs.ball.vx*=-0.7;}

checkBallCarCollision(p);
checkBallCarCollision(gs.ai);

/* goals */
var goalTop=gs.groundY-gs.goalH;
if(gs.ball.x-gs.ball.r<gs.goalW&&gs.ball.y>goalTop&&gs.ball.y<gs.groundY){
gs.score[1]++;playSound(800,0.4,"sine");
if($("g-score-ai"))$("g-score-ai").textContent=gs.score[1];
resetBall();checkWin();
}
if(gs.ball.x+gs.ball.r>gs.W-gs.goalW&&gs.ball.y>goalTop&&gs.ball.y<gs.groundY){
gs.score[0]++;playSound(800,0.4,"sine");gameGoals++;saveJSON("rl_game_goals",gameGoals);checkAchieve("goal_machine");
if($("g-score-p"))$("g-score-p").textContent=gs.score[0];
resetBall();checkWin();
}

if($("g-boost"))$("g-boost").style.width=Math.max(0,p.boost)+"%";
}

function checkWin(){
if(gs.score[0]>=gs.maxScore){
gs.running=false;
if($("g-status"))$("g-status").textContent="You Win!";
fireConfetti();
}else if(gs.score[1]>=gs.maxScore){
gs.running=false;
if($("g-status"))$("g-status").textContent="AI Wins!";
}
}

function draw(){
ctx.fillStyle="#1a472a";ctx.fillRect(0,0,gs.W,gs.H);
/* ground */
ctx.fillStyle="#2d5a2d";ctx.fillRect(0,gs.groundY,gs.W,gs.H-gs.groundY);
/* lines */
ctx.strokeStyle="rgba(255,255,255,0.15)";ctx.lineWidth=1;
ctx.beginPath();ctx.moveTo(gs.W/2,0);ctx.lineTo(gs.W/2,gs.groundY);ctx.stroke();
ctx.beginPath();ctx.arc(gs.W/2,gs.groundY/2,50,0,Math.PI*2);ctx.stroke();

/* goals */
var goalTop=gs.groundY-gs.goalH;
ctx.fillStyle="rgba(255,107,0,0.3)";ctx.fillRect(0,goalTop,gs.goalW,gs.goalH);
ctx.strokeStyle="#ff6b00";ctx.lineWidth=2;ctx.strokeRect(0,goalTop,gs.goalW,gs.goalH);
ctx.fillStyle="rgba(33,150,243,0.3)";ctx.fillRect(gs.W-gs.goalW,goalTop,gs.goalW,gs.goalH);
ctx.strokeStyle="#2196f3";ctx.strokeRect(gs.W-gs.goalW,goalTop,gs.goalW,gs.goalH);

/* ball */
ctx.beginPath();ctx.arc(gs.ball.x,gs.ball.y,gs.ball.r,0,Math.PI*2);
ctx.fillStyle="#eeeeee";ctx.fill();
ctx.strokeStyle="#cccccc";ctx.lineWidth=1;ctx.stroke();
/* hex pattern on ball */
for(var a=0;a<6;a++){
var angle=a*Math.PI/3;
ctx.beginPath();
ctx.moveTo(gs.ball.x,gs.ball.y);
ctx.lineTo(gs.ball.x+Math.cos(angle)*gs.ball.r*0.7,gs.ball.y+Math.sin(angle)*gs.ball.r*0.7);
ctx.strokeStyle="rgba(0,0,0,0.15)";ctx.stroke();
}

/* player car */
var p=gs.player;
ctx.save();
if(p.flip){ctx.translate(p.x+p.w/2,p.y+p.h/2);ctx.rotate(p.flipTimer*0.4);ctx.translate(-p.w/2,-p.h/2);}
else{ctx.translate(p.x,p.y);}
ctx.fillStyle="#ff6b00";ctx.fillRect(0,0,p.w,p.h);
ctx.fillStyle="#ff8c33";ctx.fillRect(p.w*0.6,2,p.w*0.35,p.h-4);
/* wheels */
ctx.fillStyle="#333";
ctx.fillRect(5,p.h-4,10,4);ctx.fillRect(p.w-15,p.h-4,10,4);
ctx.restore();

/* boost trail */
if((gs.keys["ShiftLeft"]||gs.keys["ShiftRight"]||gs.touchK.boost)&&p.boost>0){
ctx.save();ctx.globalAlpha=0.6;
for(var i=0;i<3;i++){
ctx.beginPath();ctx.arc(p.x-i*6,p.y+p.h/2,4-i,0,Math.PI*2);
ctx.fillStyle=i===0?"#ff6b00":i===1?"#ffaa00":"#ffdd00";ctx.fill();
}
ctx.restore();
}

/* AI car */
var a=gs.ai;
ctx.save();
ctx.translate(a.x,a.y);
ctx.fillStyle="#2196f3";ctx.fillRect(0,0,a.w,a.h);
ctx.fillStyle="#42a5f5";ctx.fillRect(2,2,a.w*0.35,a.h-4);
ctx.fillStyle="#333";
ctx.fillRect(5,a.h-4,10,4);ctx.fillRect(a.w-15,a.h-4,10,4);
ctx.restore();
}

function gameLoop(){
update();draw();
requestAnimationFrame(gameLoop);
}
gameLoop();

$("g-start").addEventListener("click",function(){
if(gs.audioCtx&&gs.audioCtx.state==="suspended")gs.audioCtx.resume();
gs.running=true;gs.started=true;

html+='<button class="btn btn-outline" id="set-export" style="margin:4px 0;width:100%">Export Data (JSON)</button>';
html+='<button class="btn btn-outline" id="set-reset" style="margin:4px 0;width:100%;color:#f44336;border-color:#f44336">Reset All Data</button></div>';
html+='</div>';
}

panel.innerHTML=html;

/* more subtab events */
var mTabs=qsa(".more-subtab");
for(var i=0;i<mTabs.length;i++){
mTabs[i].addEventListener("click",function(){
moreSubTab=this.getAttribute("data-mst");
renderMore();
});
}

/* notes auto-save */
if($("notes-area")){
$("notes-area").addEventListener("input",function(){
notes=this.value;saveNotes();
if($("notes-count"))$("notes-count").textContent=notes.length+" characters";
checkAchieve("note_taker");
});
}

/* settings events */
if($("set-theme")){
$("set-theme").addEventListener("change",function(){settings.theme=this.value;saveSettings();applyTheme();});
}
if($("set-accent")){
$("set-accent").addEventListener("change",function(){settings.accent=this.value;saveSettings();applyTheme();});
}
if($("set-sort")){
$("set-sort").addEventListener("change",function(){settings.sort=this.value;mechSort=this.value;saveSettings();});
}
if($("set-user")){
$("set-user").addEventListener("input",function(){settings.username=this.value;saveSettings();applyTheme();});
}
if($("set-rank")){
$("set-rank").addEventListener("change",function(){settings.rank=this.value;saveSettings();applyTheme();});
}
if($("set-export")){
$("set-export").addEventListener("click",function(){
var data={settings:settings,sessions:sessions,mechProgress:mechProgress,mechFavs:mechFavs,goals:goals,notes:notes,achievements:achievements};
var blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
var url=URL.createObjectURL(blob);
var a=document.createElement("a");a.href=url;a.download="rl-training-hub-backup.json";a.click();
URL.revokeObjectURL(url);
});
}
if($("set-reset")){
$("set-reset").addEventListener("click",function(){
if(confirm("Are you sure? This will delete ALL your data.")){
localStorage.clear();location.reload();
}
});
}
}

/* ===== PWA REGISTRATION ===== */
function registerSW(){
if("serviceWorker" in navigator){
navigator.serviceWorker.register("sw.js").catch(function(){});
}
}

/* ===== INIT ===== */
function init(){
applyTheme();
initTabs();
initParticles();
renderMechanics();
renderRoutine();
renderTracker();
renderGoals();
renderGarage();
renderPros();
renderMore();
initGame();
registerSW();
checkAchieve("dedicated");
}

if(document.readyState==="loading"){
document.addEventListener("DOMContentLoaded",init);
}else{
init();
}
})();
</script>
</body>
</html>
